<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Corpo da claquete -->
  <rect x="2" y="7" width="20" height="14" rx="2" fill="#E50914"/>
  <!-- Topo da claquete -->
  <rect x="2" y="4" width="20" height="4" rx="1" fill="#141414"/>
  <!-- Listras diagonais do topo -->
  <line x1="6"  y1="4" x2="4"  y2="8" stroke="#E50914" stroke-width="1.5"/>
  <line x1="10" y1="4" x2="8"  y2="8" stroke="#E50914" stroke-width="1.5"/>
  <line x1="14" y1="4" x2="12" y2="8" stroke="#E50914" stroke-width="1.5"/>
  <line x1="18" y1="4" x2="16" y2="8" stroke="#E50914" stroke-width="1.5"/>
  <!-- Símbolo play no centro -->
  <polygon points="9,11 9,17 16,14" fill="white"/>
</svg>
