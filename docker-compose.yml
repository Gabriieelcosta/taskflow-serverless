version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cinemax_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinemax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinemax123}
      POSTGRES_DB: ${POSTGRES_DB:-cinemax_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cinemax']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinemax_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
